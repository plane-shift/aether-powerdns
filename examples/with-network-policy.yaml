# NetworkPolicy locks down ingress to the pdns pods:
#   - DNS (53/tcp + 53/udp): from anywhere (DNS is fundamentally public).
#   - HTTP API (8081/tcp): from the pdns namespace + `external-dns`
#     namespace only.
#
# Pre-reqs:
#   - A CNI that enforces NetworkPolicy (Cilium, Calico, etc.).
#   - The allowed namespaces must carry the standard
#     `kubernetes.io/metadata.name=<name>` label (auto-applied since
#     Kubernetes 1.22).
apiVersion: dns.aetherplatform.cloud/v1alpha1
kind: PowerDNSServer
metadata:
  name: locked
  namespace: aether-system
spec:
  replicas: 1
  backend:
    type: postgres
    postgres:
      storageSize: 5Gi
  dns:
    exposure: loadBalancer
    loadBalancer:
      annotations:
        metallb.io/address-pool: aether-public
  networkPolicy:
    enabled: true
    additionalAllowedAPINamespaces:
      - external-dns
