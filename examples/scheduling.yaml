# Pin pdns pods to a dedicated DNS node pool. Assumes you've labelled
# nodes with `node-role.aetherplatform.cloud/dns=` and tainted them with
# `aetherplatform.cloud/dedicated=dns:NoSchedule` (tier-1 infra pattern).
apiVersion: dns.aetherplatform.cloud/v1alpha1
kind: PowerDNSServer
metadata:
  name: pinned
  namespace: aether-system
spec:
  replicas: 2
  backend:
    type: postgres
    postgres:
      instances: 1
      storageSize: 5Gi
  dns:
    exposure: loadBalancer
    loadBalancer:
      annotations:
        metallb.io/address-pool: aether-public
  scheduling:
    nodeSelector:
      node-role.aetherplatform.cloud/dns: ""
    tolerations:
      - key: aetherplatform.cloud/dedicated
        operator: Equal
        value: dns
        effect: NoSchedule
    priorityClassName: system-cluster-critical
